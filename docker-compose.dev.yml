services:
  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: knova
      POSTGRES_PASSWORD: knova_secret
      POSTGRES_DB: knova
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knova"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@knova.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  ml-api:
    build:
      context: .
      dockerfile: ./apps/ml/Dockerfile
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://knova:knova_secret@postgres:5432/knova
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OLLAMA_BASE_URL: http://ollama:11434
      AI_SERVICE_DB_SCHEMA: ml
      AI_SERVICE_DISABLE_AUTH: "true"
      AI_SERVICE_INLINE_ASYNC_JOBS: "false"
      AI_SERVICE_ARTIFACT_ROOT: /app/data
      AI_SERVICE_TEMPLATE_DIR: /app/apps/ml/templates
    ports:
      - "8000:8000"
    volumes:
      - ml_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started

  ml-worker:
    build:
      context: .
      dockerfile: ./apps/ml/Dockerfile
    command: ["arq", "ml_service.workers.settings.WorkerSettings"]
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://knova:knova_secret@postgres:5432/knova
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OLLAMA_BASE_URL: http://ollama:11434
      AI_SERVICE_DB_SCHEMA: ml
      AI_SERVICE_DISABLE_AUTH: "true"
      AI_SERVICE_INLINE_ASYNC_JOBS: "false"
      AI_SERVICE_ARTIFACT_ROOT: /app/data
      AI_SERVICE_TEMPLATE_DIR: /app/apps/ml/templates
    volumes:
      - ml_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started

volumes:
  postgres_data:
  ollama_data:
  ml_data:
