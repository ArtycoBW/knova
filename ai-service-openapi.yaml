openapi: 3.0.3
info:
  title: Knova AI Service API
  version: 1.0.0-draft
  description: |
    Contract for the standalone Python AI service.
    Covers compatibility endpoints, native AI tasks, editable projects,
    jobs, artifacts, templates, and media rendering workflows.
servers:
  - url: https://ai-service.internal
    description: Internal AI service
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Catalog
  - name: Compatibility
  - name: Tasks
  - name: Projects
  - name: Jobs
  - name: Artifacts
  - name: Templates
paths:
  /health/live:
    get:
      tags: [Health]
      summary: Liveness probe
      operationId: getLiveHealth
      security: []
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /health/ready:
    get:
      tags: [Health]
      summary: Readiness probe
      operationId: getReadyHealth
      security: []
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'
  /v1/providers:
    get:
      tags: [Catalog]
      summary: List configured providers
      operationId: listProviders
      responses:
        '200':
          description: Providers catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderListResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /v1/models:
    get:
      tags: [Catalog, Compatibility]
      summary: List available model aliases and capabilities
      operationId: listModels
      responses:
        '200':
          description: Models catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelListResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /v1/chat/completions:
    post:
      tags: [Compatibility]
      summary: OpenAI-style chat completions endpoint
      operationId: createChatCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: Completion generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /v1/embeddings:
    post:
      tags: [Compatibility]
      summary: OpenAI-style embeddings endpoint
      operationId: createEmbeddings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmbeddingsRequest'
      responses:
        '200':
          description: Embeddings created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbeddingsResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /v1/audio/transcriptions:
    post:
      tags: [Compatibility]
      summary: Transcribe audio or extract speech from video
      operationId: createTranscription
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TranscriptionMultipartRequest'
      responses:
        '200':
          description: Transcription result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscriptionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /v1/audio/speech:
    post:
      tags: [Compatibility]
      summary: Synthesize speech and return artifact references
      operationId: createSpeechSynthesis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpeechSynthesisRequest'
      responses:
        '200':
          description: Speech generated synchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpeechSynthesisResponse'
        '202':
          description: Speech generation accepted as async job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAcceptedResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /v1/tasks/chat-rag:
    post:
      tags: [Tasks]
      summary: Generate grounded chat answer from history and source chunks
      operationId: runChatRagTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRagRequest'
      responses:
        '200':
          description: Chat answer generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatRagResponse'
        '202':
          description: Task accepted as async job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAcceptedResponse'
  /v1/tasks/compare:
    post:
      tags: [Tasks]
      summary: Compare two or more documents
      operationId: runCompareTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompareRequest'
      responses:
        '200':
          description: Comparison result generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompareResponse'
        '202':
          description: Task accepted as async job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAcceptedResponse'
  /v1/tasks/mindmap:
    post:
      tags: [Tasks]
      summary: Generate editable mindmap graph
      operationId: runMindmapTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MindmapRequest'
      responses:
        '200':
          description: Mindmap generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MindmapResponse'
        '202':
          description: Task accepted as async job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAcceptedResponse'
  /v1/tasks/quiz:
    post:
      tags: [Tasks]
      summary: Generate quiz without fixed question limits
      operationId: runQuizTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuizRequest'
      responses:
        '200':
          description: Quiz generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizResponse'
        '202':
          description: Task accepted as async job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAcceptedResponse'
  /v1/tasks/table:
    post:
      tags: [Tasks]
      summary: Extract structured table from arbitrary sources
      operationId: runTableTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TableRequest'
      responses:
        '200':
          description: Table generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableResponse'
        '202':
          description: Task accepted as async job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAcceptedResponse'
  /v1/tasks/infographic:
    post:
      tags: [Tasks]
      summary: Generate infographic specification and optional renders
      operationId: runInfographicTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InfographicRequest'
      responses:
        '200':
          description: Infographic generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfographicResponse'
        '202':
          description: Task accepted as async job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAcceptedResponse'
  /v1/tasks/report:
    post:
      tags: [Tasks]
      summary: Generate report from template and sources
      operationId: runReportTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportRequest'
      responses:
        '200':
          description: Report generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '202':
          description: Task accepted as async job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAcceptedResponse'
  /v1/tasks/presentation:
    post:
      tags: [Tasks]
      summary: Create editable presentation project
      operationId: runPresentationTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresentationTaskRequest'
      responses:
        '200':
          description: Presentation project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresentationTaskResponse'
        '202':
          description: Task accepted as async job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAcceptedResponse'
  /v1/tasks/podcast:
    post:
      tags: [Tasks]
      summary: Create editable podcast project with TTS pipeline
      operationId: runPodcastTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PodcastTaskRequest'
      responses:
        '200':
          description: Podcast project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PodcastTaskResponse'
        '202':
          description: Task accepted as async job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAcceptedResponse'
  /v1/tasks/video:
    post:
      tags: [Tasks]
      summary: Create editable video project or rendering job
      operationId: runVideoTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VideoTaskRequest'
      responses:
        '200':
          description: Video project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoTaskResponse'
        '202':
          description: Task accepted as async job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAcceptedResponse'
  /v1/projects:
    get:
      tags: [Projects]
      summary: List AI projects
      operationId: listProjects
      parameters:
        - in: query
          name: project_type
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            default: 50
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
    post:
      tags: [Projects]
      summary: Create empty or seeded AI project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
      responses:
        '200':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /v1/projects/{project_id}:
    get:
      tags: [Projects]
      summary: Get project by id
      operationId: getProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
        '404':
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [Projects]
      summary: Patch project metadata, settings, or content
      operationId: patchProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectPatchRequest'
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
        '400':
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags: [Projects]
      summary: Archive or delete project
      operationId: deleteProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '204':
          description: Project deleted
  /v1/projects/{project_id}/export:
    post:
      tags: [Projects]
      summary: Export project into one or more artifacts
      operationId: exportProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '200':
          description: Export completed synchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportResponse'
        '202':
          description: Export accepted as async job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAcceptedResponse'
  /v1/projects/{project_id}/slides:
    post:
      tags: [Projects]
      summary: Add slide to presentation project
      operationId: addSlide
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddSlideRequest'
      responses:
        '200':
          description: Slide added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresentationProject'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /v1/projects/{project_id}/slides/{slide_id}:
    patch:
      tags: [Projects]
      summary: Update slide in presentation project
      operationId: updateSlide
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SlideId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSlideRequest'
      responses:
        '200':
          description: Slide updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresentationProject'
    delete:
      tags: [Projects]
      summary: Delete slide from presentation project
      operationId: deleteSlide
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SlideId'
      responses:
        '204':
          description: Slide deleted
  /v1/projects/{project_id}/slides/{slide_id}/regenerate:
    post:
      tags: [Projects]
      summary: Regenerate one slide or selected fields only
      operationId: regenerateSlide
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SlideId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegenerateSlideRequest'
      responses:
        '200':
          description: Slide regenerated synchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresentationProject'
        '202':
          description: Regeneration accepted as async job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAcceptedResponse'
  /v1/projects/{project_id}/segments/{segment_id}:
    patch:
      tags: [Projects]
      summary: Update podcast segment
      operationId: updateSegment
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SegmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSegmentRequest'
      responses:
        '200':
          description: Segment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PodcastProject'
  /v1/projects/{project_id}/segments/{segment_id}/rerender:
    post:
      tags: [Projects]
      summary: Re-render only one podcast segment
      operationId: rerenderSegment
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SegmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RerenderSegmentRequest'
      responses:
        '202':
          description: Segment render accepted as async job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAcceptedResponse'
  /v1/projects/{project_id}/scenes/{scene_id}:
    patch:
      tags: [Projects]
      summary: Update video scene
      operationId: updateScene
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SceneId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSceneRequest'
      responses:
        '200':
          description: Scene updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoProject'
  /v1/projects/{project_id}/scenes/{scene_id}/rerender:
    post:
      tags: [Projects]
      summary: Re-render only one video scene
      operationId: rerenderScene
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SceneId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RerenderSceneRequest'
      responses:
        '202':
          description: Scene render accepted as async job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAcceptedResponse'
  /v1/jobs:
    get:
      tags: [Jobs]
      summary: List jobs
      operationId: listJobs
      parameters:
        - in: query
          name: type
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: project_id
          schema:
            type: string
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            default: 50
      responses:
        '200':
          description: Job list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobListResponse'
  /v1/jobs/{job_id}:
    get:
      tags: [Jobs]
      summary: Get job by id
      operationId: getJob
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          $ref: '#/components/responses/ErrorResponse'
  /v1/jobs/{job_id}/cancel:
    post:
      tags: [Jobs]
      summary: Cancel running or queued job
      operationId: cancelJob
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
  /v1/artifacts:
    get:
      tags: [Artifacts]
      summary: List generated artifacts
      operationId: listArtifacts
      parameters:
        - in: query
          name: kind
          schema:
            type: string
        - in: query
          name: project_id
          schema:
            type: string
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            default: 50
      responses:
        '200':
          description: Artifact list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactListResponse'
  /v1/artifacts/{artifact_id}:
    get:
      tags: [Artifacts]
      summary: Get artifact metadata
      operationId: getArtifact
      parameters:
        - $ref: '#/components/parameters/ArtifactId'
      responses:
        '200':
          description: Artifact found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artifact'
        '404':
          $ref: '#/components/responses/ErrorResponse'
  /v1/artifacts/{artifact_id}/download:
    get:
      tags: [Artifacts]
      summary: Download artifact content
      operationId: downloadArtifact
      parameters:
        - $ref: '#/components/parameters/ArtifactId'
      responses:
        '200':
          description: Artifact binary stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
  /v1/templates:
    get:
      tags: [Templates]
      summary: List prompt and output templates
      operationId: listTemplates
      parameters:
        - in: query
          name: kind
          schema:
            type: string
        - in: query
          name: version
          schema:
            type: string
      responses:
        '200':
          description: Template list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateListResponse'
  /v1/templates/{template_id}:
    get:
      tags: [Templates]
      summary: Get template by id
      operationId: getTemplate
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      responses:
        '200':
          description: Template found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '404':
          $ref: '#/components/responses/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ProjectId:
      in: path
      name: project_id
      required: true
      schema:
        type: string
    SlideId:
      in: path
      name: slide_id
      required: true
      schema:
        type: string
    SegmentId:
      in: path
      name: segment_id
      required: true
      schema:
        type: string
    SceneId:
      in: path
      name: scene_id
      required: true
      schema:
        type: string
    JobId:
      in: path
      name: job_id
      required: true
      schema:
        type: string
    ArtifactId:
      in: path
      name: artifact_id
      required: true
      schema:
        type: string
    TemplateId:
      in: path
      name: template_id
      required: true
      schema:
        type: string
  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
        details:
          type: object
          additionalProperties: true
    HealthResponse:
      type: object
      required: [status, timestamp]
      properties:
        status:
          type: string
          enum: [ok]
        timestamp:
          type: string
          format: date-time
    ReadinessResponse:
      type: object
      required: [status, timestamp, checks]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        timestamp:
          type: string
          format: date-time
        checks:
          type: array
          items:
            type: object
            required: [name, status]
            properties:
              name:
                type: string
              status:
                type: string
                enum: [ok, degraded, failed]
              details:
                type: object
                additionalProperties: true
    ProviderListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ProviderDescriptor'
    ProviderDescriptor:
      type: object
      required: [id, kind, enabled, capabilities]
      properties:
        id:
          type: string
          example: gemini
        kind:
          type: string
          enum: [text, embeddings, stt, tts, render, video, image]
        enabled:
          type: boolean
        routing_group:
          type: string
        capabilities:
          type: array
          items:
            type: string
        default_model_aliases:
          type: object
          additionalProperties:
            type: string
    ModelListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ModelDescriptor'
    ModelDescriptor:
      type: object
      required: [id, alias, provider, modality, capabilities]
      properties:
        id:
          type: string
          example: gemini-2.5-flash
        alias:
          type: string
          example: text-default
        provider:
          type: string
          example: gemini
        modality:
          type: string
          enum: [text, embeddings, audio, video, multimodal]
        capabilities:
          type: array
          items:
            type: string
        recommended_for:
          type: array
          items:
            type: string
        context_window:
          type: integer
        max_output_tokens:
          type: integer
        dimensions:
          type: integer
          nullable: true
    ExecutionOptions:
      type: object
      properties:
        mode:
