<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Knova офлайн</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #09090b;
        color: #f8fafc;
        font-family: Inter, system-ui, sans-serif;
      }
      .card {
        width: min(92vw, 460px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 28px;
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        margin: 0;
        line-height: 1.6;
        color: rgba(248, 250, 252, 0.75);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Knova офлайн</h1>
      <p>Соединение пропало. Как только интернет вернётся, можно будет продолжить работу с материалами и AI-инструментами.</p>
    </div>
  </body>
  </html>
